version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ANYTHING_PROJECT_TOKEN=${ANYTHING_PROJECT_TOKEN}
      - JOB_RUNNER_SECRET=${JOB_RUNNER_SECRET}
      - SMS_INBOUND_SECRET=${SMS_INBOUND_SECRET}
    restart: always

  # Background worker for the Jobs queue. Serverless has no resident worker, so
  # this loop simply drains the queue by POSTing to the authenticated
  # /api/jobs/process endpoint on an interval.
  worker:
    image: alpine:3.19
    depends_on:
      - web
    environment:
      - JOB_RUNNER_SECRET=${JOB_RUNNER_SECRET}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache wget >/dev/null 2>&1 || true
        while true; do
          wget -q -O - \
            --header="x-job-runner-secret: $${JOB_RUNNER_SECRET}" \
            --post-data='' \
            http://web:3000/api/jobs/process || true
          sleep 5
        done
    restart: always
