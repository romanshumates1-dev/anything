name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + mocked tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace web typecheck
      - run: yarn workspace web test

  flows-live:
    name: Layer C (live DB flow runner)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Fail if TEST_DATABASE_URL is missing
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL secret is not set."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap test schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      - run: corepack enable
      - run: yarn install --immutable

      - name: Run live flows (writes execution_runs)
        run: yarn workspace web test

      - name: Assert execution_runs has PASS rows for all 3 flows
        run: |
          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -t -A -c "
            SELECT CASE WHEN COUNT(*) = 3 THEN 'OK' ELSE 'MISSING' END
            FROM execution_runs
            WHERE step IS NULL AND passed = true
              AND flow IN ('campaign_lifecycle','csv_import_10k','scheduler_validation');
          " | grep -q '^OK$' || { echo "::error::execution_runs missing PASS summaries"; exit 1; }
