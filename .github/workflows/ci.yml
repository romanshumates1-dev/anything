name: CI

# NOTE: GitHub only runs workflows from `.github/workflows/` at the REPOSITORY ROOT.
# This platform restricts writes to the /apps directory, so the file lives here.
# To activate CI: copy this file to `<repo-root>/.github/workflows/ci.yml`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# JOB 1 — Web: typecheck (shipped code only) + full mocked test suite.
#
# typecheck uses tsconfig.typecheck.json which excludes **/*.test.ts and
# __tests__/** so vi.fn / mock-internal patterns never trip strict tsc.
# Tests run without RUN_LIVE_FLOWS so flows-live.test.ts self-skips.
# ─────────────────────────────────────────────────────────────
jobs:
  web:
    name: "Web — typecheck + unit/contract tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Enable Corepack BEFORE any yarn invocation so Yarn Berry resolves the
      # correct version from .yarnrc.yml without a "no matching version" error.
      - name: Enable Corepack
        run: corepack enable

      # Cache Yarn's global content-addressed store keyed on the lockfile.
      # A cache hit makes `yarn install --immutable` a sub-second no-op.
      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      # Typechecks ONLY shipped code (routes, lib, utils, pages).
      # tsconfig.typecheck.json extends tsconfig.json but excludes all
      # *.test.ts / __tests__/** so mock-internal type noise (vi.fn,
      # .mock.calls[i][n], as any) can never block the deploy gate.
      - name: Typecheck shipped code
        run: yarn workspace web typecheck

      # Runs endpoints.contract.test.ts + flows/flows.test.ts + the
      # always-skip guard in flows-live.test.ts (describe.skipIf(LIVE)).
      # All DB calls are mocked; no network or DB access required.
      - name: Run mocked tests (Layer A + B)
        run: yarn workspace web test

# ─────────────────────────────────────────────────────────────
# JOB 2 — Layer C: live flow runner against a real Neon test branch.
#
# Only runs after the web job passes. Bootstraps the schema, then executes
# flows-live.test.ts against the real DB. Any failed step fails CI.
#
# Requirements:
#   TEST_DATABASE_URL — a Neon branch postgres:// connection string,
#   configured as a GitHub repo secret. The @neondatabase/serverless
#   driver speaks HTTP to Neon, so a plain postgres:// service container
#   won't work here — it must be a real Neon branch URL.
# ─────────────────────────────────────────────────────────────
  flows-live:
    name: "Layer C — live DB flow runner"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web]

    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: "1"
      # Matches the hardcoded SECRET constant in flows-live.test.ts so the
      # job-runner and SMS webhook auth checks pass without real secrets.
      JOB_RUNNER_SECRET: "flow-runner-secret"
      SMS_INBOUND_SECRET: "flow-runner-secret"
      # PGSSLMODE ensures psql honours SSL even if the URL parser omits it.
      PGSSLMODE: require

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Hard-fail with a clear message rather than a cryptic Neon connection
      # error many steps later.
      - name: Verify TEST_DATABASE_URL secret is configured
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error title=Missing secret::TEST_DATABASE_URL is not set."
            echo "Add a Neon branch postgres:// connection string as a GitHub repo secret."
            echo "The @neondatabase/serverless driver requires a real Neon URL."
            exit 1
          fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      # Apply the schema idempotently against the test branch.
      # All tables use CREATE TABLE IF NOT EXISTS so this is safe to re-run.
      # PGSSLMODE=require is inherited from the job-level env block.
      - name: Bootstrap test schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      # Run ONLY the live flow test file by name pattern. Vitest matches the
      # pattern against file paths, so "flows-live" targets only
      # flows-live.test.ts and skips the mocked Layer A/B suite entirely.
      # assertFlowPassed() inside the test calls expect([]).toEqual([]) on the
      # first failing step, naming the step + reason in the CI log.
      - name: Run live flow tests (Layer C)
        run: yarn workspace web test -- flows-live



