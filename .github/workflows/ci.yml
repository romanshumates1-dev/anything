name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: force Corepack BEFORE setup-node can leak Yarn 1
      - name: Enable Corepack FIRST
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate

      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: yarn

      - name: Verify Yarn version (debug safety)
        run: yarn --version

      - name: Install dependencies (strict CI)
        run: yarn install --immutable

      - name: Typecheck
        run: yarn workspace web typecheck

      - name: Run tests
        run: yarn workspace web test

  flows-live:
    name: Layer C (live DB flow runner)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack FIRST
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate

      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: yarn

      - name: Fail if no test database configured
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL secret is not set."
            exit 1
          fi

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap test schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      - name: Install dependencies (strict CI)
        run: yarn install --immutable

      - name: Run live flow tests
        run: yarn workspace web test
