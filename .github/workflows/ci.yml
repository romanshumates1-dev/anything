name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      # 🔥 DEBUG STEP (THIS PREVENTS SILENT FAILURES)
      - name: Validate lockfile consistency (diagnostic)
        run: |
          echo "Checking dependency sync..."
          yarn install --mode=skip-build || true
          echo "Checking for drift..."
          git diff --exit-code yarn.lock || (echo "::error::Lockfile drift detected. Run 'yarn install' locally and commit yarn.lock" && exit 1)

      # 🔥 REAL INSTALL (STRICT MODE)
      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Typecheck
        run: yarn workspace web typecheck

      - name: Run tests
        run: yarn workspace web test

  flows-live:
    name: Layer C (live DB flow runner)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Fail if missing DB
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL missing"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      - name: Enable Corepack
        run: corepack enable

      # 🔥 SAME FIX HERE (IMPORTANT)
      - name: Validate lockfile consistency (diagnostic)
        run: |
          git diff --exit-code yarn.lock || (echo "::error::Lockfile drift detected" && exit 1)

      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Run live flows
        run: yarn workspace web test
