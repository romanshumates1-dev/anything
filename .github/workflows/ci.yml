name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      # 🔥 NEW: hard pre-check to explain lockfile mismatch clearly
      - name: Verify dependency sync (lockfile safety check)
        run: |
          echo "Checking Yarn lockfile consistency..."
          yarn install --check-cache || true

      # keep immutable install (correct production behavior)
      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Typecheck
        run: yarn workspace web typecheck

      - name: Run tests
        run: yarn workspace web test

  flows-live:
    name: Layer C (live DB flow runner)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if test DB missing
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL secret is missing"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Run live flow tests
        run: yarn workspace web test
