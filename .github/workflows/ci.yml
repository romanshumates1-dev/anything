name: CI

# NOTE: GitHub only runs workflows from `.github/workflows/` at the REPOSITORY ROOT.
# This platform restricts writes to the /apps directory, so the file lives here.
# To activate CI: move this file to `<repo-root>/.github/workflows/ci.yml`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn workspace web typecheck

      # Real endpoint contract + unit/flow (Layer A+B) tests. The live Layer C
      # runner self-skips here because RUN_LIVE_FLOWS is not set.
      - name: Run tests
        run: yarn workspace web test

  flows-live:
    name: Layer C (live DB flow runner)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Requires a real Neon test branch URL in repo secrets. The @neondatabase/
    # serverless driver speaks HTTP to a Neon endpoint, so a plain postgres
    # service container cannot back it — this MUST be a Neon branch URL.
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_LIVE_FLOWS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if no test database configured
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::TEST_DATABASE_URL secret is not set. Layer C requires a real Neon test branch."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap test schema
        run: psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f apps/web/db/schema.sql

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # Executes flows-live.test.ts against the REAL DB. Any failed step fails
      # the suite (expect(allPassed).toBe(true)) -> fails this job -> fails the
      # pipeline. No mocked DB is used in this job.
      - name: Run live flow tests
        run: yarn workspace web test
